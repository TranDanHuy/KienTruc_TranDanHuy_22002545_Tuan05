version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: mysql_nodejs
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: app_db
      MYSQL_USER: app_user
      MYSQL_PASSWORD: app_password
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    restart: always

  nodejs:
    build: .
    container_name: nodejs_mysql_app
    ports:
      - "3000:3000"
    environment:
      DB_HOST: mysql
      DB_USER: app_user
      DB_PASSWORD: app_password
      DB_NAME: app_db
    depends_on:
      - mysql
    volumes:
      - .:/app
      - /app/node_modules
    restart: always

volumes:
  mysql_data:
