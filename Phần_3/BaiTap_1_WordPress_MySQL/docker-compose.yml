version: '3.8'

services:
  mysql:
    image: mysql:5.7
    container_name: mysql_wordpress_p3
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: wordpress_db
      MYSQL_USER: wordpress
      MYSQL_PASSWORD: wordpress123
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - wordpress_network
    restart: always

  wordpress:
    image: wordpress:latest
    container_name: wordpress_container_p3
    environment:
      WORDPRESS_DB_HOST: mysql:3306
      WORDPRESS_DB_NAME: wordpress_db
      WORDPRESS_DB_USER: wordpress
      WORDPRESS_DB_PASSWORD: wordpress123
    ports:
      - "80:80"
    volumes:
      - wordpress_data:/var/www/html
    networks:
      - wordpress_network
    depends_on:
      - mysql
    restart: always

volumes:
  mysql_data:
  wordpress_data:

networks:
  wordpress_network:
    driver: bridge
