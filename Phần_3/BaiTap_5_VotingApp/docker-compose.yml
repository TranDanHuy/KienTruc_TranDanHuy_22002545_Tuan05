version: '3.8'

services:
  redis:
    image: redis:7-alpine
    container_name: redis_voting
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - voting_network
    restart: always

  postgres:
    image: postgres:15-alpine
    container_name: postgres_voting
    environment:
      POSTGRES_DB: voting
      POSTGRES_USER: voting
      POSTGRES_PASSWORD: voting123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - voting_network
    restart: always

  vote:
    build:
      context: .
      dockerfile: Dockerfile.vote
    container_name: vote_app
    ports:
      - "5000:5000"
    depends_on:
      - redis
    networks:
      - voting_network
    restart: always

  result:
    build:
      context: .
      dockerfile: Dockerfile.result
    container_name: result_app
    ports:
      - "5001:5001"
    depends_on:
      - postgres
    networks:
      - voting_network
    restart: always

  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    container_name: voting_worker
    depends_on:
      - redis
      - postgres
    networks:
      - voting_network
    restart: always

volumes:
  redis_data:
  postgres_data:

networks:
  voting_network:
    driver: bridge
