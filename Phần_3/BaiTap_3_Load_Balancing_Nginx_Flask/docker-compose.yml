version: '3.8'

services:
  flask1:
    build: .
    container_name: flask1_container
    networks:
      - lb_network
    restart: always

  flask2:
    build: .
    container_name: flask2_container
    networks:
      - lb_network
    restart: always

  nginx:
    image: nginx:alpine
    container_name: nginx_lb
    ports:
      - "8080:8080"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - flask1
      - flask2
    networks:
      - lb_network
    restart: always

networks:
  lb_network:
    driver: bridge
